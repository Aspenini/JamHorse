app-id: com.aspenini.jamhorse
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: jamhorse
finish-args:
  - --share=network
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.secrets
modules:
  - name: jamhorse
    buildsystem: simple
    build-commands:
      - install -Dm755 jamhorse /app/bin/jamhorse
      - cp -a lib /app/bin/lib
      - cp -a data /app/bin/data
      - install -Dm644 com.aspenini.jamhorse.desktop /app/share/applications/com.aspenini.jamhorse.desktop
      - install -Dm644 com.aspenini.jamhorse.metainfo.xml /app/share/metainfo/com.aspenini.jamhorse.metainfo.xml
      - install -Dm644 jamhorse-512.png /app/share/icons/hicolor/512x512/apps/com.aspenini.jamhorse.png
      - install -Dm644 LICENSE /app/share/licenses/jamhorse/LICENSE
      - install -Dm644 THIRD_PARTY_NOTICES.md /app/share/licenses/jamhorse/THIRD_PARTY_NOTICES.md
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
      - type: file
        path: com.aspenini.jamhorse.desktop
      - type: file
        path: com.aspenini.jamhorse.metainfo.xml
      - type: file
        path: ../../assets/icons-output/web/icon-512.png
        dest-filename: jamhorse-512.png
      - type: file
        path: ../../LICENSE
      - type: file
        path: ../../THIRD_PARTY_NOTICES.md
