name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test tool
      - run: dart run build_runner build
      - run: git diff --exit-code -- lib/data/database.g.dart
      - run: dart run tool/generate_third_party_notices.dart
      - run: git diff --exit-code -- THIRD_PARTY_NOTICES.md
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - run: dart run tool/check_coverage.dart
      - name: Scan dependency lockfiles
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2
        with:
          scan-args: |-
            --lockfile=pubspec.lock

  cast-receiver:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: cast_receiver
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsecret-1-dev libmpv-dev ninja-build xvfb
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - if: runner.os == 'macOS'
        run: flutter build macos --release
      - if: runner.os == 'Windows'
        run: flutter build windows --release
      - if: runner.os == 'Linux'
        run: flutter build linux --release
      - name: Smoke launch macOS bundle
        if: runner.os == 'macOS'
        run: |
          open build/macos/Build/Products/Release/JamHorse.app
          sleep 5
          pgrep -x JamHorse
          pkill -x JamHorse
      - name: Smoke launch Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process build/windows/x64/runner/Release/jamhorse.exe -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) { throw "JamHorse exited during smoke launch." }
          Stop-Process -Id $process.Id
      - name: Smoke launch Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          timeout 10s xvfb-run -a build/linux/x64/release/bundle/jamhorse
          status=$?
          test "$status" -eq 124
