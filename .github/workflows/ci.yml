name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter analyze
      - run: flutter test --coverage

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release

  desktop:
    strategy:
      matrix:
        os: [macos-15, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsecret-1-dev libmpv-dev ninja-build
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          cache: true
      - run: flutter pub get
      - if: runner.os == 'macOS'
        run: flutter build macos --release
      - if: runner.os == 'Windows'
        run: flutter build windows --release
      - if: runner.os == 'Linux'
        run: flutter build linux --release
