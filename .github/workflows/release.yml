name: Signed release artifacts

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  preflight:
    runs-on: ubuntu-24.04
    environment: production
    env:
      CAST_RECEIVER_APP_ID: ${{ secrets.CAST_RECEIVER_APP_ID }}
      CAST_RECEIVER_URL: ${{ secrets.CAST_RECEIVER_URL }}
      RELEASE_SIGNING_READY: ${{ secrets.RELEASE_SIGNING_READY }}
    steps:
      - name: Require protected production configuration
        run: |
          test "$RELEASE_SIGNING_READY" = "true" || { echo "Production signing is not enabled."; exit 1; }
          test -n "$CAST_RECEIVER_APP_ID" || { echo "Missing Cast application ID."; exit 1; }
          case "$CAST_RECEIVER_URL" in
            https://*) ;;
            *) echo "The Cast receiver must use production HTTPS."; exit 1 ;;
          esac

  android:
    needs: preflight
    runs-on: ubuntu-24.04
    environment: production
    env:
      CAST_RECEIVER_APP_ID: ${{ secrets.CAST_RECEIVER_APP_ID }}
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Configure production signing
        run: |
          for name in KEYSTORE_BASE64 KEY_ALIAS KEY_PASSWORD STORE_PASSWORD; do
            test -n "${!name}" || { echo "Missing $name"; exit 1; }
          done
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          {
            echo "storeFile=release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties
      - run: flutter pub get
      - run: flutter build appbundle --release --dart-define=CAST_RECEIVER_APP_ID="$CAST_RECEIVER_APP_ID"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: JamHorse-Android
          path: build/app/outputs/bundle/release/app-release.aab

  apple:
    needs: preflight
    runs-on: macos-15
    environment: production
    env:
      CAST_RECEIVER_APP_ID: ${{ secrets.CAST_RECEIVER_APP_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_P12: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      MACOS_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      NOTARY_ID: ${{ secrets.APPLE_NOTARY_ID }}
      NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
      CARPLAY_ENABLED: ${{ secrets.CARPLAY_ENABLED }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install production identities
        run: |
          for name in APPLE_TEAM_ID IOS_P12 IOS_P12_PASSWORD IOS_PROFILE IOS_PROFILE_NAME MACOS_P12 MACOS_P12_PASSWORD KEYCHAIN_PASSWORD NOTARY_ID NOTARY_PASSWORD; do
            test -n "${!name}" || { echo "Missing $name"; exit 1; }
          done
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security list-keychain -d user -s build.keychain
          printf '%s' "$IOS_P12" | base64 --decode > "$RUNNER_TEMP/ios.p12"
          printf '%s' "$MACOS_P12" | base64 --decode > "$RUNNER_TEMP/macos.p12"
          security import "$RUNNER_TEMP/ios.p12" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain
          security import "$RUNNER_TEMP/macos.p12" -P "$MACOS_P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$IOS_PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/jamhorse.mobileprovision"
          cat > ios/Flutter/Signing.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = $IOS_PROFILE_NAME
          EOF
          cat > macos/Flutter/Signing.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Developer ID Application
          EOF
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key><dict>
              <key>com.aspenini.jamhorse</key><string>$IOS_PROFILE_NAME</string>
            </dict>
          </dict></plist>
          EOF
          if [ "$CARPLAY_ENABLED" = "true" ]; then
            cp ios/Runner/CarPlay.entitlements.example ios/Runner/CarPlay.entitlements
            echo "CODE_SIGN_ENTITLEMENTS = Runner/CarPlay.entitlements" >> ios/Flutter/Signing.xcconfig
            /usr/libexec/PlistBuddy -c "Set :JamHorseCarPlayEnabled true" ios/Runner/Info.plist
          fi
      - run: flutter pub get
      - run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --dart-define=CAST_RECEIVER_APP_ID="$CAST_RECEIVER_APP_ID"
      - run: flutter build macos --release
      - name: Create and notarize DMG
        run: |
          mkdir -p "$RUNNER_TEMP/dmg/Licenses"
          cp -R build/macos/Build/Products/Release/JamHorse.app "$RUNNER_TEMP/dmg/"
          cp LICENSE THIRD_PARTY_NOTICES.md "$RUNNER_TEMP/dmg/Licenses/"
          hdiutil create -volname JamHorse -srcfolder "$RUNNER_TEMP/dmg" -ov -format UDZO JamHorse-macOS.dmg
          xcrun notarytool submit JamHorse-macOS.dmg --apple-id "$NOTARY_ID" --password "$NOTARY_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple JamHorse-macOS.dmg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: JamHorse-Apple
          path: |
            build/ios/ipa/*.ipa
            JamHorse-macOS.dmg

  windows:
    needs: preflight
    runs-on: windows-2025
    environment: production
    env:
      CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Require certificate
        shell: pwsh
        run: |
          if (!$env:CERTIFICATE_BASE64 -or !$env:CERTIFICATE_PASSWORD) { throw "Missing Windows signing certificate." }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\jamhorse.pfx", [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Sign and package
        shell: pwsh
        run: |
          signtool sign /f "$env:RUNNER_TEMP\jamhorse.pfx" /p "$env:CERTIFICATE_PASSWORD" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 build\windows\x64\runner\Release\jamhorse.exe
          Copy-Item LICENSE,THIRD_PARTY_NOTICES.md build\windows\x64\runner\Release\
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Force build\windows\x64\runner\Release\* dist\JamHorse-windows.zip
          dart run msix:create --build-windows false --sign-msix true --install-certificate false --certificate-path "$env:RUNNER_TEMP\jamhorse.pfx" --certificate-password "$env:CERTIFICATE_PASSWORD"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: JamHorse-Windows
          path: dist/*

  linux:
    needs: preflight
    runs-on: ubuntu-24.04
    environment: production
    env:
      GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsecret-1-dev libmpv-dev ninja-build
      - run: |
          test -n "$GPG_PRIVATE_KEY" && test -n "$GPG_PASSPHRASE"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package and sign
        run: |
          cp LICENSE THIRD_PARTY_NOTICES.md build/linux/x64/release/bundle/
          tar -C build/linux/x64/release -czf JamHorse-linux.tar.gz bundle
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor JamHorse-linux.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: JamHorse-Linux
          path: |
            JamHorse-linux.tar.gz
            JamHorse-linux.tar.gz.asc

  cast-receiver:
    needs: preflight
    runs-on: ubuntu-24.04
    environment: production
    defaults:
      run:
        working-directory: cast_receiver
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: JamHorse-Cast-Receiver
          path: cast_receiver/dist
