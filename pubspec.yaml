name: jamhorse
description: A fluent, cross-platform Jellyfin music player.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  background_downloader: ^9.5.5
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  dio: ^5.9.0
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  jellyfin_api:
    path: packages/jellyfin_api
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  logging: ^1.3.0
  media_kit_libs_linux: any
  media_kit_libs_windows_audio: any
  shared_preferences: ^2.5.3
  uuid: ^4.5.2
  window_manager: ^0.5.1

dev_dependencies:
  build_runner: ^2.7.1
  drift_dev: ^2.34.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/icons/
